name: Geneventure CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (${{ matrix.device }})
    runs-on: macos-latest
    strategy:
      matrix:
        device: ["iPhone 15", "iPad (10th generation)"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Build Project
        run: |
          xcodebuild build \
            -project Geneventure.xcodeproj \
            -scheme Geneventure \
            -destination "platform=iOS Simulator,name=${{ matrix.device }}" \
            -quiet
