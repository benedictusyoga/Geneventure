name: Geneventure CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run SwiftLint
        uses: realm/SwiftLint@main

      - name: Build Project
        run: |
          xcodebuild build \
            -project Geneventure.xcodeproj \
            -scheme Geneventure \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -quiet