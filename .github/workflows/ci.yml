name: Geneventure CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Build Project
        run: |
          xcodebuild build \
            -project Geneventure.xcodeproj \
            -scheme Geneventure \
            -destination 'platform=iOS Simulator,name=iPad Pro 13-inch (M4),OS=latest' \
            -quiet
