name: Geneventure CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Xcode Version
        # Optional: Ensures a specific Xcode version is used
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Run SwiftLint
        # This will run your current .swiftlint.yml configuration
        run: swiftlint

      - name: Build Project
        # This builds the app for a simulator target to verify compilation
        run: |
          xcodebuild build \
            -project Geneventure.xcodeproj \
            -scheme Geneventure \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -quiet
